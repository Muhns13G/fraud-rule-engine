services:
  postgres:
    image: 'postgres:18.3'
    environment:
      - 'POSTGRES_DB=fraud_rule_engine'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=fraud_engine'
    ports:
      - '5432:5432'
    volumes:
      - 'postgres-data:/var/lib/postgresql/data'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud_engine -d fraud_rule_engine"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
