name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  repository-hygiene:
    name: Repository Hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run repository hygiene checks
        run: ./scripts/run-repo-hygiene-checks.sh

  build-test-package:
    name: Build, Test, Package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: repository-hygiene

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Show Docker info
        run: docker version

      - name: Compile
        run: ./mvnw --batch-mode --no-transfer-progress clean compile

      - name: Test
        run: ./mvnw --batch-mode --no-transfer-progress test

      - name: Package
        run: ./mvnw --batch-mode --no-transfer-progress package

  phase4-security-ops-regression:
    name: Phase 4 Security/Ops Regression
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: repository-hygiene

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Show Docker info
        run: docker version

      - name: Run Phase 4 security/ops regression suite
        run: ./scripts/run-phase4-security-ops-regression.sh

  phase5-production-hardening-gates:
    name: Phase 5 Production Hardening Gates
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: repository-hygiene

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Show Docker info
        run: docker version

      - name: Run Phase 5 production-hardening gates
        run: ./scripts/run-phase5-production-hardening-gates.sh
