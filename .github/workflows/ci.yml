name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-test-package:
    name: Build, Test, Package
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Show Docker info
        run: docker version

      - name: Compile
        run: ./mvnw --batch-mode --no-transfer-progress clean compile

      - name: Test
        run: ./mvnw --batch-mode --no-transfer-progress test

      - name: Package
        run: ./mvnw --batch-mode --no-transfer-progress package
