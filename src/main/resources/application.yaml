spring:
  application:
    name: fraud-rule-engine
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    open-in-view: false

app:
  fraud-rules:
    high-amount:
      review-threshold: ${FRAUD_RULE_HIGH_AMOUNT_REVIEW_THRESHOLD:10000.00}
      block-threshold: ${FRAUD_RULE_HIGH_AMOUNT_BLOCK_THRESHOLD:25000.00}
    velocity:
      threshold-count: ${FRAUD_RULE_VELOCITY_THRESHOLD_COUNT:3}
      window-minutes: ${FRAUD_RULE_VELOCITY_WINDOW_MINUTES:5}
    risky-merchant-category:
      flagged-categories: ${FRAUD_RULE_RISKY_MERCHANT_CATEGORIES:GAMBLING,CRYPTO,MONEY_TRANSFER}
    unusual-time:
      start: ${FRAUD_RULE_UNUSUAL_TIME_START:00:00}
      end: ${FRAUD_RULE_UNUSUAL_TIME_END:04:00}
  security:
    secure-profile:
      username: ${FRAUD_ENGINE_SECURE_USER:secure-user}
      password: ${FRAUD_ENGINE_SECURE_PASSWORD:change-me-secure}
      role: ${FRAUD_ENGINE_SECURE_ROLE:API_CLIENT}
      admin-role: ${FRAUD_ENGINE_SECURE_ADMIN_ROLE:API_CLIENT}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

---
spring:
  config:
    activate:
      on-profile: secure

management:
  endpoint:
    health:
      show-details: when_authorized
      roles: ${FRAUD_ENGINE_SECURE_ROLE:API_CLIENT}

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p [%X{requestId:-no-request-id}] --- [%15.15t] %logger{36} : %msg%n"
